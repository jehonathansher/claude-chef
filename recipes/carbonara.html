<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carbonara — Claude Chef</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf9f6;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a1a;
      color: #faf9f6;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header span.logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }
    header span.sep { opacity: 0.3; }
    header span.title {
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0.6;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      background: #1a1a1a;
      color: #faf9f6;
      padding: 80px 40px 60px;
      max-width: 100%;
    }
    .hero .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .hero h1 em {
      font-style: italic;
      color: #c9a96e;
    }
    .hero .meta {
      display: flex;
      gap: 32px;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 0.55;
      margin-top: 24px;
    }
    .hero .meta span strong {
      display: block;
      font-weight: 600;
      font-size: 1rem;
      opacity: 1;
      color: #faf9f6;
      margin-bottom: 2px;
    }

    /* ── Sources ── */
    .sources {
      background: #f0ece4;
      padding: 18px 40px;
      font-size: 0.78rem;
      color: #666;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .sources span { font-weight: 600; color: #333; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.7rem; }
    .sources a { color: #c9a96e; text-decoration: none; font-weight: 500; }
    .sources a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 60px;
    }

    @media (max-width: 680px) {
      .content { grid-template-columns: 1fr; padding: 40px 24px; }
      .hero { padding: 60px 24px 40px; }
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 20px;
    }

    /* ── Ingredients ── */
    .ingredients { }
    .ingredients-sticky { position: sticky; top: 30px; }

    .ingredient-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px solid #e8e4db;
      gap: 16px;
    }
    .ingredient-item:first-of-type { border-top: 1px solid #e8e4db; }
    .ingredient-name { font-size: 0.9rem; font-weight: 400; }
    .ingredient-qty { font-size: 0.9rem; font-weight: 600; white-space: nowrap; color: #1a1a1a; }

    .substitution {
      margin-top: 20px;
      background: #f0ece4;
      border-left: 3px solid #c9a96e;
      padding: 14px 16px;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #555;
    }
    .substitution strong { color: #1a1a1a; display: block; margin-bottom: 4px; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── Steps ── */
    .steps { }

    .step {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 20px;
      margin-bottom: 36px;
      align-items: start;
    }
    .step-number {
      width: 36px;
      height: 36px;
      background: #1a1a1a;
      color: #faf9f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .step-body {}
    .step-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .step-desc {
      font-size: 0.88rem;
      line-height: 1.75;
      color: #444;
    }
    .step-desc .qty {
      font-weight: 600;
      color: #1a1a1a;
    }
    .step-desc .visual {
      font-style: italic;
      color: #888;
    }

    /* ── Pro tip ── */
    .pro-tip {
      margin-top: 10px;
      background: #1a1a1a;
      color: #faf9f6;
      padding: 24px 28px;
      border-radius: 4px;
      font-size: 0.88rem;
      line-height: 1.7;
      grid-column: 1 / -1;
    }
    .pro-tip strong {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #c9a96e;
      display: block;
      margin-bottom: 8px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.75rem;
      color: #bbb;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">Claude Chef</span>
    <span class="sep">—</span>
    <span class="title">Recipe Card</span>
  </header>

  <!-- RECIPE CONTENT GOES HERE -->

  <footer>Claude Chef · Recipe researched &amp; written by AI, tested by you.</footer>
</body>
</html>
