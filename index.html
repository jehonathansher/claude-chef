<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Chef</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf9f6;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #faf9f6;
      padding: 60px 40px 50px;
    }
    header .tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 16px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
    }
    header h1 em { font-style: italic; color: #c9a96e; }
    header p {
      margin-top: 16px;
      font-size: 0.85rem;
      opacity: 0.45;
      letter-spacing: 0.03em;
    }

    main {
      max-width: 700px;
      margin: 60px auto;
      padding: 0 40px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 24px;
    }

    .recipe-list {
      list-style: none;
    }

    .recipe-list li a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #e8e4db;
      text-decoration: none;
      color: #1a1a1a;
      transition: color 0.15s;
    }
    .recipe-list li:first-child a { border-top: 1px solid #e8e4db; }
    .recipe-list li a:hover { color: #c9a96e; }

    .recipe-list .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 400;
    }
    .recipe-list .arrow {
      font-size: 1rem;
      opacity: 0.3;
      transition: opacity 0.15s, transform 0.15s;
    }
    .recipe-list li a:hover .arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    footer {
      text-align: center;
      padding: 60px 40px;
      font-size: 0.75rem;
      color: #bbb;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <header>
    <div class="tag">My Cookbook</div>
    <h1>Claude <em>Chef</em></h1>
    <p>Every recipe, researched and refined.</p>
  </header>

  <main>
    <div class="section-label">Recipes</div>
    <ul class="recipe-list">
      <li><a href="recipes/carbonara.html"><span class="name">Carbonara</span><span class="arrow">→</span></a></li>
      <!-- NEW RECIPES GO HERE -->
    </ul>
  </main>

  <footer>Claude Chef · Built in Claude Code</footer>

</body>
</html>
