<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Chef</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111;
      --white: #fefefe;
      --grey: #f4f3f0;
      --mid: #999;
      --accent: #d4a853;
      --border: #e8e6e1;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 1px solid var(--border);
    }
    .wordmark {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .wordmark em { font-style: italic; color: var(--accent); }
    nav span {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* HERO */
    .hero {
      padding: 100px 48px 80px;
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.03em;
      max-width: 700px;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .hero p {
      margin-top: 32px;
      font-size: 0.9rem;
      color: var(--mid);
      letter-spacing: 0.02em;
      max-width: 340px;
      line-height: 1.7;
    }

    /* GRID */
    .grid-section {
      padding: 64px 48px;
    }
    .grid-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 32px;
    }
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }
    .recipe-card {
      display: block;
      background: var(--grey);
      padding: 36px 32px;
      text-decoration: none;
      color: var(--black);
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .recipe-card:hover { background: var(--black); color: var(--white); }
    .recipe-card:hover .card-arrow { color: var(--accent); }
    .recipe-card:hover .card-tag { color: #555; }

    .card-tag {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .card-name em { font-style: italic; }
    .card-arrow {
      display: block;
      margin-top: 32px;
      font-size: 1.2rem;
      color: var(--mid);
      transition: color 0.2s, transform 0.2s;
    }
    .recipe-card:hover .card-arrow { transform: translate(4px, -4px); }

    /* EMPTY STATE */
    .empty {
      grid-column: 1 / -1;
      padding: 60px;
      text-align: center;
      color: var(--mid);
      font-size: 0.85rem;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--mid);
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      nav, .hero, .grid-section, footer { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="wordmark">Claude <em>Chef</em></div>
    <span>My Cookbook</span>
  </nav>

  <div class="hero">
    <h1>Every recipe,<br/><em>researched</em><br/>& refined.</h1>
    <p>A personal cookbook built with Claude. Every recipe is sourced from real chefs, tested techniques, and refined to your taste.</p>
  </div>

  <div class="grid-section">
    <div class="grid-label">Recipes</div>
    <div class="recipe-grid">

      <a href="recipes/carbonara.html" class="recipe-card">
        <div class="card-tag">Pasta · Roman</div>
        <div class="card-name">Carbo<em>nara</em></div>
        <span class="card-arrow">↗</span>
      </a>

      <!-- NEW RECIPES GO HERE -->

    </div>
  </div>

  <footer>
    <span>Claude Chef</span>
    <span>Built in Claude Code</span>
  </footer>

</body>
</html>
