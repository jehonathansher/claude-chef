<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude Chef</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #111; background: #fff; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 56px 24px; }
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .sub { font-size: 14px; color: #777; margin: 4px 0 36px; }
  h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #777; margin-bottom: 8px; }
  a.recipe {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 1px solid #e5e5e5;
    text-decoration: none; color: #111;
  }
  a.recipe:first-of-type { border-top: 1px solid #e5e5e5; }
  a.recipe:hover { color: #777; }
  .recipe .name { font-size: 16px; }
  .recipe .tag { font-size: 13px; color: #999; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Claude Chef</h1>
  <div class="sub">Researched recipes, refined to taste.</div>

  <h2>Recipes</h2>
  <a class="recipe" href="recipes/carbonara.html">
    <span class="name">Carbonara</span>
    <span class="tag">Pasta · Roman</span>
  </a>
  <!-- NEW RECIPES GO HERE -->
</div>
</body>
</html>
